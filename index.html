<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>focus on today</title>
</head>

<body>


   <section class="main-containt">
     <h1> <span>Focus on</span> Today</h1>


            <section class="original-data">
                <div class="today-and-star">
                    <p>Today</p>
                    <img src="Sun.svg" alt="">
                </div>


                <div class="bar-and-text-dicv">
                     <p class="show-quotes">Raise the bar by completing your goals!</p>
                    <div class="progressbar">
                       <div class="progress-value">
                            
                       </div>
                    </div>
                  
                   
                </div>

                    <div class="add-goal-paren">
                <div class="add-goal add-goal1">
                <p class="error ">Please set all the 3 goals!</p>

                    <div class="first-goal goal1">
                        <div class="chose1-goal chose-goal">
                            <img class="tick-img" src="tick.svg" alt="">
                        </div>
                       <input id="first" type="text" placeholder="Add new goal.." value="">

                    </div>  

                </div>
               <div class="add-goal add-goal2">

                    <div class="first-goal goal2  ">
                        <div class="chose2-goal chose-goal"> <img class="tick-img" src="tick.svg" alt=""></div>
                       <input id="second" type="text" placeholder="Add new goal.." value="">

                    </div>  

                </div>
               <div class="add-goal add-goal3">

                    <div class="first-goal goal3  ">
                        <div class="chose3-goal chose-goal">
                             <img class="tick-img" src="tick.svg" alt="">
                        </div>
                       <input id="third" type="text" placeholder="Add new goal.." value="">

                    </div>  

                </div>
                </div>

                <div class="move-on-step">
              “Move one step ahead, today!”
                </div>
            </section>


                      
   </section>


</body>

</html>
